<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WDD 131 activity: prepare responsive images with the picture element."
    />
    <meta name="author" content="Luis Regnier" />

    <title>Responsive Images</title>
    <link rel="stylesheet" href="styles/responsive-images.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="icon-link" href="#" aria-label="Back">
        <img src="images/arrow.svg" alt="" width="28" height="28" />
      </a>

      <span class="brand">D&amp;Co.</span>

      <a class="icon-link" href="#" aria-label="Facebook">
        <img src="images/facebook.svg" alt="" width="28" height="28" />
      </a>
    </header>

    <main>
      <h1>Responsive Images</h1>
      <p>
        This page uses the <code>&lt;picture&gt;</code> element to swap images
        based on screen width.
      </p>

      <div class="hero">
        <picture>
          <source
            media="(min-width: 1000px)"
            srcset="images/hero-large.webp"
          />
          <source
            media="(min-width: 500px)"
            srcset="images/hero-medium.webp"
          />
          <img
            src="images/hero-small.webp"
            alt="Landscape in southern Idaho"
            width="1500"
            height="750"
          />
        </picture>
      </div>

      <p class="note">
        Try resizing your browser: under 500px you should get the small image,
        500px to 999px the medium, and 1000px and up the large.
      </p>
    </main>

    <footer>WDD 131 | Week 03</footer>
  </body>
</html>
